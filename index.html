<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>نظام إدارة المؤسسات</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { direction: rtl; }
    .page { display: none; }
    .active-page { display: block; }
  </style>
</head>

<body class="container py-4">

  <!-- ------------------ Navbar ------------------ -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 rounded">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">نظام الإدارة</a>

      <div>
        <button class="btn btn-light me-2" onclick="showPage('hierarchyPage')">الهيكلية</button>
        <button class="btn btn-light" onclick="showPage('employeesPage')">الموظفين</button>
      </div>
    </div>
  </nav>

  <!-- ------------------ صفحة الهيكلية ------------------ -->
  <div id="hierarchyPage" class="page active-page">

    <h2 class="mb-3">إدارة الهيكلية</h2>

    <!-- إضافة مؤسسة -->
    <div class="card mb-4">
      <div class="card-header">إضافة مؤسسة</div>
      <div class="card-body">
        <input id="orgName" class="form-control mb-2" placeholder="اسم المؤسسة">
        <button class="btn btn-primary" onclick="addHierarchy('Institution','orgName')">إضافة</button>
      </div>
    </div>

    <h4>المؤسسات</h4>
    <div id="orgList" class="mb-5"></div>

    <hr>

    <!-- إضافة قسم -->
    <div class="card mb-4">
      <div class="card-header">إضافة قسم</div>
      <div class="card-body">
        <input id="deptName" class="form-control mb-2" placeholder="اسم القسم">
        <select id="deptOrgSelect" class="form-select mb-2"></select>
        <button class="btn btn-primary" onclick="addHierarchy('Department','deptName','deptOrgSelect')">إضافة</button>
      </div>
    </div>

    <h4>الأقسام</h4>
    <div id="deptList" class="mb-5"></div>

    <hr>

    <!-- إضافة شعبة -->
    <div class="card mb-4">
      <div class="card-header">إضافة شعبة</div>
      <div class="card-body">
        <input id="divName" class="form-control mb-2" placeholder="اسم الشعبة">
        <select id="divDeptSelect" class="form-select mb-2"></select>
        <button class="btn btn-primary" onclick="addHierarchy('Section','divName','divDeptSelect')">إضافة</button>
      </div>
    </div>

    <h4>الشعب</h4>
    <div id="divList" class="mb-5"></div>

  </div>

  <!-- ------------------ صفحة الموظفين ------------------ -->
  <div id="employeesPage" class="page">

    <h2 class="mb-3">إدارة الموظفين</h2>

    <!-- إضافة موظف -->
    <div class="card mb-4">
      <div class="card-header">إضافة موظف</div>
      <div class="card-body">
        <input id="empName" class="form-control mb-2" placeholder="اسم الموظف">
        <select id="empHierarchySelect" class="form-select mb-2"></select>
        <button class="btn btn-primary" onclick="addEmployee()">إضافة</button>
      </div>
    </div>

    <h4>قائمة الموظفين</h4>
    <div id="empList" class="mb-5"></div>

  </div>

  <!-- ------------------ مودال التعديل ------------------ -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">تعديل البيانات</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input id="editName" class="form-control mb-3">
          <select id="editSelect" class="form-select"></select>

          <input type="hidden" id="editId">
          <input type="hidden" id="editType">
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
          <button class="btn btn-success" onclick="saveEdit()">حفظ</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="crud.js"></script>

  <script>
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
      document.getElementById(pageId).classList.add('active-page');
    }
  </script>

</body>
</html>
