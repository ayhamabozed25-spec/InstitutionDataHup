<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>نظام إدارة المؤسسات</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="container py-4" dir="rtl">

  <h1 class="mb-4 text-center">نظام إدارة المؤسسات</h1>

  <!-- ------------------ إضافة مؤسسة ------------------ -->
  <div class="card mb-4">
    <div class="card-header">إضافة مؤسسة</div>
    <div class="card-body">
      <input id="orgName" class="form-control mb-2" placeholder="اسم المؤسسة">
      <button class="btn btn-primary" onclick="addOrganization()">إضافة</button>
    </div>
  </div>

  <h3>قائمة المؤسسات</h3>
  <div id="orgList" class="mb-5"></div>

  <hr>

  <!-- ------------------ إضافة قسم ------------------ -->
  <div class="card mb-4">
    <div class="card-header">إضافة قسم</div>
    <div class="card-body">
      <input id="deptName" class="form-control mb-2" placeholder="اسم القسم">

      <select id="deptOrgSelect" class="form-select mb-2"></select>

      <button class="btn btn-primary" onclick="addDepartment()">إضافة</button>
    </div>
  </div>

  <h3>قائمة الأقسام</h3>
  <div id="deptList" class="mb-5"></div>

  <hr>

  <!-- ------------------ إضافة شعبة ------------------ -->
  <div class="card mb-4">
    <div class="card-header">إضافة شعبة</div>
    <div class="card-body">
      <input id="divName" class="form-control mb-2" placeholder="اسم الشعبة">

      <select id="divDeptSelect" class="form-select mb-2"></select>

      <button class="btn btn-primary" onclick="addDivision()">إضافة</button>
    </div>
  </div>

  <h3>قائمة الشعب</h3>
  <div id="divList" class="mb-5"></div>

  <hr>

  <!-- ------------------ إضافة موظف ------------------ -->
  <div class="card mb-4">
    <div class="card-header">إضافة موظف</div>
    <div class="card-body">
      <input id="empName" class="form-control mb-2" placeholder="اسم الموظف">

      <select id="empDivSelect" class="form-select mb-2"></select>

      <button class="btn btn-primary" onclick="addEmployee()">إضافة</button>
    </div>
  </div>

  <h3>قائمة الموظفين</h3>
  <div id="empList" class="mb-5"></div>

  <!-- ------------------ مودال التعديل ------------------ -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">تعديل البيانات</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input id="editName" class="form-control mb-3">

          <select id="editSelect" class="form-select"></select>

          <input type="hidden" id="editId">
          <input type="hidden" id="editType">
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
          <button class="btn btn-success" onclick="saveEdit()">حفظ</button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="crud.js"></script>

</body>
</html>
