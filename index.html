<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نظام الأصول - إدارة البيانات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">نظام الأصول</a>
      <div class="d-flex gap-2">
        <a href="search.html" class="btn btn-outline-light btn-sm">صفحة البحث</a>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    <div class="card shadow-sm">
      <div class="card-header bg-white border-0">
        <ul class="nav nav-tabs card-header-tabs">
          <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#emp-pane">الموظفون</button></li>
          <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#buildings-pane">الأبنية والمؤسسات</button></li>
        </ul>
      </div>

      <div class="card-body tab-content">

        <!-- الموظفون -->
        <div class="tab-pane fade show active" id="emp-pane">
          <div class="card">
            <div class="card-header bg-light"><strong>إضافة موظف</strong></div>
            <div class="card-body">
              <label class="form-label">اسم الموظف</label>
              <input type="text" id="empName" class="form-control mb-3">
              <label class="form-label">القسم</label>
              <select id="empDeptSelect" class="form-select mb-3" onchange="loadSectionsForEmployee()"></select>
              <input type="hidden" id="oldDeptValue">
              <label class="form-label">الشعبة</label>
              <select id="empSectionSelect" class="form-select mb-3"></select>
              <input type="hidden" id="oldSectionValue">
              <button class="btn btn-primary" onclick="addEmployee()">حفظ الموظف</button>
            </div>
          </div>
        </div>

        <!-- الأبنية والمؤسسات -->
        <div class="tab-pane fade" id="buildings-pane">
          <div class="card">
            <div class="card-header bg-light"><strong>إضافة مبنى / مؤسسة</strong></div>
            <div class="card-body">
              <label class="form-label">اسم المؤسسة</label>
              <input type="text" id="b_name" class="form-control mb-3">
              <label class="form-label">نوع المؤسسة</label>
              <input type="text" id="b_type" class="form-control mb-3">
              <label class="form-label">العنوان</label>
              <input type="text" id="b_address" class="form-control mb-3">

              <div id="projectsContainer" class="mb-3">
                <label class="form-label">المشاريع المخططة</label>
                <input type="text" name="projects[]" class="form-control mb-2">
              </div>
              <button type="button" class="btn btn-secondary btn-sm mb-3" onclick="addProjectField()">إضافة مشروع آخر</button>

              <div id="challengesContainer" class="mb-3">
                <label class="form-label">التحديات</label>
                <input type="text" name="challenges[]" class="form-control mb-2">
              </div>
              <button type="button" class="btn btn-secondary btn-sm mb-3" onclick="addChallengeField()">إضافة تحدي آخر</button>

              <div id="servicesContainer" class="mb-3">
                <label class="form-label">الخدمات المقدمة</label>
                <input type="text" name="services[]" class="form-control mb-2">
              </div>
              <button type="button" class="btn btn-secondary btn-sm mb-3" onclick="addServiceField()">إضافة خدمة أخرى</button>

              <div id="opportunitiesContainer" class="mb-3">
                <label class="form-label">الفرص</label>
                <input type="text" name="opportunities[]" class="form-control mb-2">
              </div>
              <button type="button" class="btn btn-secondary btn-sm mb-3" onclick="addOpportunityField()">إضافة فرصة أخرى</button>

              <button class="btn btn-primary" onclick="addBuilding()">حفظ البيانات</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="crud.js" type="module"></script>
</body>
</html>
