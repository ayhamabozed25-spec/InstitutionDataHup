<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>نظام الأصول - إدارة البيانات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">نظام الأصول</a>
      <div>
        <a href="search.html" class="btn btn-outline-light btn-sm">
          صفحة البحث
        </a>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    <div class="card shadow-sm">
      <div class="card-header bg-white border-0">
        <ul class="nav nav-tabs card-header-tabs" id="mainTabs" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" id="dept-tab" data-bs-toggle="tab"
              data-bs-target="#dept-pane" type="button" role="tab">
              الأقسام والشعب
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="emp-tab" data-bs-toggle="tab"
              data-bs-target="#emp-pane" type="button" role="tab">
              الموظفون
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="assets-tab" data-bs-toggle="tab"
              data-bs-target="#assets-pane" type="button" role="tab">
              الأصول (أجهزة / مركبات / أثاث)
            </button>
          </li>
        </ul>
      </div>

      <div class="card-body tab-content">

        <!-- الأقسام والشعب -->
        <div class="tab-pane fade show active" id="dept-pane" role="tabpanel">
          <div class="row g-4">
            <!-- إضافة قسم -->
            <div class="col-md-6">
              <div class="card h-100">
                <div class="card-header bg-light">
                  <strong>إضافة قسم</strong>
                </div>
                <div class="card-body">
                  <div class="mb-3">
                    <label class="form-label">اسم القسم</label>
                    <input type="text" id="deptName" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">رئيس القسم (بحث)</label>
                    <input type="text" id="deptManagerSearch" class="form-control"
                      placeholder="اكتب اسم الموظف..." oninput="searchManagerForDept(this.value)" />
                    <input type="hidden" id="deptManagerSelect" />
                    <div id="deptManagerResults" class="autocomplete-results"></div>
                  </div>
                  <button class="btn btn-primary" onclick="addDepartment()">حفظ القسم</button>
                </div>
              </div>
            </div>

            <!-- إضافة شعبة -->
            <div class="col-md-6">
              <div class="card h-100">
                <div class="card-header bg-light">
                  <strong>إضافة شعبة</strong>
                </div>
                <div class="card-body">
                  <div class="mb-3">
                    <label class="form-label">اسم الشعبة</label>
                    <input type="text" id="divName" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">القسم التابع له</label>
                    <select id="divDeptSelect" class="form-select"></select>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">رئيس الشعبة (بحث)</label>
                    <input type="text" id="divManagerSearch" class="form-control"
                      placeholder="اكتب اسم الموظف..." oninput="searchManagerForSection(this.value)" />
                    <input type="hidden" id="divManagerSelect" />
                    <div id="divManagerResults" class="autocomplete-results"></div>
                  </div>
                  <button class="btn btn-primary" onclick="addSection()">حفظ الشعبة</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- الموظفون -->
        <div class="tab-pane fade" id="emp-pane" role="tabpanel">
          <div class="row g-4">
            <div class="col-md-8">
              <div class="card">
                <div class="card-header bg-light">
                  <strong>إضافة موظف</strong>
                </div>
                <div class="card-body">
                  <div class="mb-3">
                    <label class="form-label">اسم الموظف</label>
                    <input type="text" id="empName" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">القسم</label>
                    <select id="empDeptSelect" class="form-select" onchange="loadSectionsForEmployee()"></select>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">الشعبة (اختياري)</label>
                    <select id="empSectionSelect" class="form-select"></select>
                  </div>
                  <button class="btn btn-primary" onclick="addEmployee()">حفظ الموظف</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- الأصول -->
        <div class="tab-pane fade" id="assets-pane" role="tabpanel">
          <div class="row g-4">
            <!-- جهاز -->
            <div class="col-md-4">
              <div class="card h-100">
                <div class="card-header bg-light">
                  <strong>إضافة جهاز</strong>
                </div>
                <div class="card-body">
                  <div class="mb-3">
                    <label class="form-label">اسم الجهاز</label>
                    <input type="text" id="deviceName" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">السيريال</label>
                    <input type="text" id="deviceSerial" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">الموظف المستلم (بحث)</label>
                    <input type="text" id="deviceEmpSearch" class="form-control"
                      placeholder="اكتب اسم الموظف..." oninput="searchEmployeeForDevice(this.value)" />
                    <input type="hidden" id="deviceEmpHidden" />
                    <div id="deviceEmpResults" class="autocomplete-results"></div>
                  </div>
                  <button class="btn btn-primary" onclick="addDevice()">حفظ الجهاز</button>
                </div>
              </div>
            </div>

            <!-- مركبة -->
            <div class="col-md-4">
              <div class="card h-100">
                <div class="card-header bg-light">
                  <strong>إضافة مركبة</strong>
                </div>
                <div class="card-body">
                  <div class="mb-3">
                    <label class="form-label">رقم اللوحة</label>
                    <input type="text" id="vehiclePlate" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">الموديل</label>
                    <input type="text" id="vehicleModel" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">الموظف المستلم (بحث)</label>
                    <input type="text" id="vehicleEmpSearch" class="form-control"
                      placeholder="اكتب اسم الموظف..." oninput="searchEmployeeForVehicle(this.value)" />
                    <input type="hidden" id="vehicleEmpHidden" />
                    <div id="vehicleEmpResults" class="autocomplete-results"></div>
                  </div>
                  <button class="btn btn-primary" onclick="addVehicle()">حفظ المركبة</button>
                </div>
              </div>
            </div>

            <!-- أثاث -->
            <div class="col-md-4">
              <div class="card h-100">
                <div class="card-header bg-light">
                  <strong>إضافة أثاث</strong>
                </div>
                <div class="card-body">
                  <div class="mb-3">
                    <label class="form-label">اسم الأثاث</label>
                    <input type="text" id="furnitureName" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">الكود</label>
                    <input type="text" id="furnitureCode" class="form-control" />
                  </div>
                  <div class="mb-3">
                    <label class="form-label">الموظف المستلم (بحث)</label>
                    <input type="text" id="furnitureEmpSearch" class="form-control"
                      placeholder="اكتب اسم الموظف..." oninput="searchEmployeeForFurniture(this.value)" />
                    <input type="hidden" id="furnitureEmpHidden" />
                    <div id="furnitureEmpResults" class="autocomplete-results"></div>
                  </div>
                  <button class="btn btn-primary" onclick="addFurniture()">حفظ الأثاث</button>
                </div>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="crud.js"></script>
</body>
</html>
